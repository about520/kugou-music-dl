name: Windows RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Setup RDP
        shell: pwsh
        run: |
          # Enable RDP
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Create user
          $password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
          New-LocalUser -Name "github" -Password $password -FullName "GitHub User"
          Add-LocalGroupMember -Group "Administrators" -Member "github"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "github"
          
          # Download ngrok
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath . -Force
          
          # Auth and start tunnel
          .\ngrok.exe config add-authtoken $env:NGROK_TOKEN
          Start-Process -NoNewWindow -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389"
          Start-Sleep -Seconds 15
          
          # Get tunnel URL
          $tunnelInfo = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
          $address = $tunnelInfo.tunnels[0].public_url -replace 'tcp://', ''
          
          Write-Host "========================================"
          Write-Host "RDP Address: $address"
          Write-Host "Username: github"
          Write-Host "Password: P@ssw0rd123!"
          Write-Host "========================================"
          
          # Keep alive
          Start-Sleep -Seconds 21600
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}