name: Windows RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Setup RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
          New-LocalUser -Name "github" -Password $password -FullName "GitHub User" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "github" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "github" -ErrorAction SilentlyContinue
          
          # Use localhost.run SSH tunnel for TCP  
          ssh -T -o StrictHostKeyChecking=no -R 0:localhost:3389 localhost.run 2>&1 | Tee-Object -FilePath tunnel.txt &
          Start-Sleep -Seconds 15
          
          $tunnelOutput = Get-Content tunnel.txt -Raw
          Write-Host "Tunnel output: $tunnelOutput"
          
          # localhost.run: "Connect to http://XXXX.localhost.run or https://XXXX.localhost.run"
          # -R 0: assigns a random subdomain with port embedded
          if ($tunnelOutput -match '([a-zA-Z0-9]+)\.localhost\.run') {
            $address = $matches[1] + ".localhost.run"
          } elseif ($tunnelOutput -match '([a-zA-Z0-9]+-[a-zA-Z0-9]+)\.localhost\.run') {
            $address = $matches[1] + ".localhost.run"
          } else {
            $address = $tunnelOutput
          }
          
          Write-Host "========================================"
          Write-Host "RDP Address: $address"
          Write-Host "Username: github"
          Write-Host "Password: P@ssw0rd123!"
          Write-Host "========================================"
          
          Start-Sleep -Seconds 21600
          Write-Host "Time up"