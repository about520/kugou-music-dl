name: Windows RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Setup RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
          New-LocalUser -Name "github" -Password $password -FullName "GitHub User" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "github" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "github" -ErrorAction SilentlyContinue
          
          # Use localhost.run SSH tunnel for TCP
          ssh -o StrictHostKeyChecking=no -R 0:localhost:3389 localhost.run 2>&1 | Out-File -FilePath tunnel.txt &
          Start-Sleep -Seconds 10
          
          $tunnelOutput = Get-Content tunnel.txt -Raw
          if ($tunnelOutput -match '(\S+\.lhr\.life):\d+') {
            $address = $matches[1]
          } elseif ($tunnelOutput -match '([\d\.]+:\d+)') {
            $address = $matches[1]
          } else {
            $address = "(check tunnel.txt)"
            $address = $tunnelOutput
          }
          
          Write-Host "========================================"
          Write-Host "RDP Address: $address"
          Write-Host "Username: github"
          Write-Host "Password: P@ssw0rd123!"
          Write-Host "========================================"
          
          Start-Sleep -Seconds 21600
          Write-Host "Time up"