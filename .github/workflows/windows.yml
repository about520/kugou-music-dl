name: Windows RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install Chinese Language
        shell: pwsh
        run: |
          Install-Language zh-CN -CopyToSettings
          Set-WinSystemLocale zh-CN
          Set-WinHomeLocation -GeoId 45
          Set-WinUserLanguageList zh-CN -Force
          Set-WinDefaultInputMethodOverride -InputTip "0804:00000804"
          
      - name: Setup RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
          New-LocalUser -Name "github" -Password $password -FullName "GitHub User" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "github" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "github" -ErrorAction SilentlyContinue
          
          # Use bore for TCP tunneling (free, no account needed)
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath . -Force
          Start-Process -NoNewWindow -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput bore_out.txt -RedirectStandardError bore_err.txt
          Start-Sleep -Seconds 10
          
          $boreOut = Get-Content bore_out.txt -Raw
          $boreErr = Get-Content bore_err.txt -Raw
          Write-Host "Bore stdout: $boreOut"
          Write-Host "Bore stderr: $boreErr"
          
          if ($boreErr -match 'listening at ([\w\.]+:\d+)') {
            $address = $matches[1]
          } elseif ($boreOut -match 'listening at ([\w\.]+:\d+)') {
            $address = $matches[1]
          } else {
            $address = "$boreOut $boreErr"
          }
          
          Write-Host "========================================"
          Write-Host "RDP Address: $address"
          Write-Host "Username: github"
          Write-Host "Password: P@ssw0rd123!"
          Write-Host "========================================"
          
          Start-Sleep -Seconds 21600
          Write-Host "Time up"